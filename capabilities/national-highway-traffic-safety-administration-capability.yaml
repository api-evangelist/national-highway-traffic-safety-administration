naftiko: 1.0.0-alpha2
info:
  label: NHTSA vPIC Vehicle API
  description: The NHTSA Product Information Catalog Vehicle Listing (vPIC) API provides endpoints to gather information on
    vehicles and their specifications, including decoding Vehicle Identification Numbers (VINs), accessing manufacturer details,
    and retrieving make, model, and equipment data. The vPIC dataset is populated using information submitted by motor vehicle
    manufacturers through the Part 565 submittals.
  tags:
  - National
  - Highway
  - Traffic
  - Safety
  - Administration
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
