apis:
  - aid: national-highway-traffic-safety-administration:vehicle-api
    name: NHTSA vPIC Vehicle API
    description: >-
      The NHTSA Product Information Catalog Vehicle Listing (vPIC) API provides
      different ways to gather information on vehicles and their specifications,
      including decoding VINs, retrieving manufacturer details, and accessing
      makes, models, equipment, and reference data.
