aid: national-highway-traffic-safety-administration
name: National Highway Traffic Safety Administration
description: >-
  The National Highway Traffic Safety Administration (NHTSA) provides APIs
  for vehicle safety information including vehicle recall data and the Product
  Information Catalog Vehicle Listing (vPIC) for decoding Vehicle Identification
  Numbers (VINs) and accessing vehicle specifications submitted by manufacturers.
